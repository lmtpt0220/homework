<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>授業課題管理アプリ</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #555;
        }

        .message {
            margin-top: 10px;
            font-weight: bold;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            vertical-align: top;
            min-width: 90px;
        }

        th {
            background-color: #e8e8e8;
        }

        .subject-name {
            font-weight: bold;
        }

        .assignment-count {
            font-size: 14px;
            color: #555;
        }

        .subject-list-item {
            background-color: #fafafa;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        ul {
            margin-top: 5px;
        }

        @media screen and (max-width: 700px) {
            body {
                padding: 10px;
            }

            table {
                font-size: 12px;
            }

            th,
            td {
                padding: 6px;
                min-width: 60px;
            }

            input,
            select,
            button {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>授業課題管理アプリ</h1>

    <!-- 授業登録 -->
    <div class="card">
        <h2>授業登録</h2>

        <div class="form-group">
            <label>曜日</label>
            <select id="daySelect">
                <option value="月曜">月曜</option>
                <option value="火曜">火曜</option>
                <option value="水曜">水曜</option>
                <option value="木曜">木曜</option>
                <option value="金曜">金曜</option>
                <option value="土曜">土曜</option>
            </select>
        </div>

        <div class="form-group">
            <label>時限</label>
            <select id="periodSelect">
                <option value="1限">1限</option>
                <option value="2限">2限</option>
                <option value="3限">3限</option>
                <option value="4限">4限</option>
                <option value="5限">5限</option>
                <option value="6限">6限</option>
            </select>
        </div>

        <div class="form-group">
            <label>授業名</label>
            <input type="text" id="subjectName" placeholder="授業名を入力してください">
        </div>

        <button onclick="registerSubject()">授業を登録する</button>

        <div id="subjectMessage" class="message"></div>
    </div>

    <!-- 課題登録 -->
    <div class="card">
        <h2>課題登録</h2>

        <div class="form-group">
            <label>課題を登録する授業</label>
            <select id="assignmentSubjectSelect"></select>
        </div>

        <div class="form-group">
            <label>課題名</label>
            <input type="text" id="assignmentName" placeholder="課題名を入力してください">
        </div>

        <button onclick="registerAssignment()">課題を登録する</button>

        <div id="assignmentMessage" class="message"></div>
    </div>

    <!-- 授業削除 -->
    <div class="card">
        <h2>授業削除</h2>

        <div class="form-group">
            <label>削除する授業</label>
            <select id="deleteSubjectSelect"></select>
        </div>

        <button onclick="deleteSubject()">授業を削除する</button>

        <div id="deleteMessage" class="message"></div>
    </div>

    <!-- 時間割表示 -->
    <div class="card">
        <h2>時間割表</h2>
        <div id="timetableArea"></div>
    </div>

    <!-- 一覧表示 -->
    <div class="card">
        <h2>授業・課題一覧</h2>
        <div id="subjectListArea"></div>
    </div>
</div>

<script>
    const days = ["月曜", "火曜", "水曜", "木曜", "金曜", "土曜"];
    const periods = ["1限", "2限", "3限", "4限", "5限", "6限"];

    let subjects = JSON.parse(localStorage.getItem("subjects")) || [];

    function saveData() {
        localStorage.setItem("subjects", JSON.stringify(subjects));
    }

    function showMessage(id, text, success = false) {
        const message = document.getElementById(id);
        message.textContent = text;

        if (success) {
            message.className = "message success";
        } else {
            message.className = "message error";
        }
    }

    function registerSubject() {
        const day = document.getElementById("daySelect").value;
        const period = document.getElementById("periodSelect").value;
        const subjectNameInput = document.getElementById("subjectName");
        const subjectName = subjectNameInput.value.trim();

        if (subjectName === "") {
            showMessage(
                "subjectMessage",
                "エラー：授業名を入力してください。"
            );
            return;
        }

        const exists = subjects.some(function(subject) {
            return subject.day === day && subject.period === period;
        });

        if (exists) {
            showMessage(
                "subjectMessage",
                "エラー：この曜日・時限にはすでに授業が登録されています。"
            );
            return;
        }

        subjects.push({
            day: day,
            period: period,
            name: subjectName,
            assignments: []
        });

        saveData();

        showMessage(
            "subjectMessage",
            "授業を登録しました。",
            true
        );

        subjectNameInput.value = "";

        updateAll();
    }

    function registerAssignment() {
        if (subjects.length === 0) {
            showMessage(
                "assignmentMessage",
                "エラー：授業が登録されていません。先に授業を登録してください。"
            );
            return;
        }

        const subjectIndex = parseInt(
            document.getElementById("assignmentSubjectSelect").value
        );

        const assignmentNameInput = document.getElementById("assignmentName");
        const assignmentName = assignmentNameInput.value.trim();

        if (assignmentName === "") {
            showMessage(
                "assignmentMessage",
                "エラー：課題名を入力してください。"
            );
            return;
        }

        subjects[subjectIndex].assignments.push(assignmentName);

        saveData();

        showMessage(
            "assignmentMessage",
            "課題を登録しました。",
            true
        );

        assignmentNameInput.value = "";

        updateAll();
    }

    function deleteSubject() {
        if (subjects.length === 0) {
            showMessage(
                "deleteMessage",
                "エラー：削除できる授業がありません。"
            );
            return;
        }

        const subjectIndex = parseInt(
            document.getElementById("deleteSubjectSelect").value
        );

        subjects.splice(subjectIndex, 1);

        saveData();

        showMessage(
            "deleteMessage",
            "授業を削除しました。",
            true
        );

        updateAll();
    }

    function updateSubjectSelect() {
        const select = document.getElementById("assignmentSubjectSelect");
        select.innerHTML = "";

        if (subjects.length === 0) {
            const option = document.createElement("option");
            option.textContent = "授業が登録されていません";
            option.value = "";
            select.appendChild(option);
            return;
        }

        subjects.forEach(function(subject, index) {
            const option = document.createElement("option");
            option.value = index;
            option.textContent =
                `${subject.day} ${subject.period} - ${subject.name}`;
            select.appendChild(option);
        });
    }

    function updateDeleteSubjectSelect() {
        const select = document.getElementById("deleteSubjectSelect");
        select.innerHTML = "";

        if (subjects.length === 0) {
            const option = document.createElement("option");
            option.textContent = "削除できる授業がありません";
            option.value = "";
            select.appendChild(option);
            return;
        }

        subjects.forEach(function(subject, index) {
            const option = document.createElement("option");
            option.value = index;
            option.textContent =
                `${subject.day} ${subject.period} - ${subject.name}`;
            select.appendChild(option);
        });
    }

    function updateTimetable() {
        const timetableArea = document.getElementById("timetableArea");

        let html = "<table>";
        html += "<tr>";
        html += "<th>時限</th>";

        days.forEach(function(day) {
            html += `<th>${day}</th>`;
        });

        html += "</tr>";

        periods.forEach(function(period) {
            html += "<tr>";
            html += `<th>${period}</th>`;

            days.forEach(function(day) {
                const subject = subjects.find(function(item) {
                    return item.day === day && item.period === period;
                });

                if (subject) {
                    html += `
                        <td>
                            <div class="subject-name">${subject.name}</div>
                            <div class="assignment-count">
                                課題: ${subject.assignments.length}件
                            </div>
                        </td>
                    `;
                } else {
                    html += "<td></td>";
                }
            });

            html += "</tr>";
        });

        html += "</table>";

        timetableArea.innerHTML = html;
    }

    function updateSubjectList() {
        const subjectListArea = document.getElementById("subjectListArea");
        subjectListArea.innerHTML = "";

        if (subjects.length === 0) {
            subjectListArea.textContent = "授業が登録されていません。";
            return;
        }

        subjects.forEach(function(subject, index) {
            const div = document.createElement("div");
            div.className = "subject-list-item";

            let html = `
                <strong>${index + 1}. ${subject.day} ${subject.period} - ${subject.name}</strong>
            `;

            if (subject.assignments.length === 0) {
                html += "<p>課題なし</p>";
            } else {
                html += "<ul>";

                subject.assignments.forEach(function(assignment, assignmentIndex) {
                    html += `<li>${assignmentIndex + 1}. ${assignment}</li>`;
                });

                html += "</ul>";
            }

            div.innerHTML = html;
            subjectListArea.appendChild(div);
        });
    }

    function updateAll() {
        updateSubjectSelect();
        updateDeleteSubjectSelect();
        updateTimetable();
        updateSubjectList();
    }

    updateAll();
</script>

</body>
</html>
